<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="description" content="Asca Gym — Elite Liquid Glass Tracker">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Asca Gym</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230A84FF' stroke-width='2'><path d='M6 3h12l4 6-10 13L2 9z'/></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

:root {
  /* Pitch Black OLED Base */
  --bg: #000000;
  
  /* Apple Liquid Glass — True Translucent System */
  --glass-1: rgba(255, 255, 255, 0.03);
  --glass-2: rgba(255, 255, 255, 0.05);
  --glass-3: rgba(255, 255, 255, 0.09);
  --glass-hover: rgba(255, 255, 255, 0.12);
  --glass-active: rgba(255, 255, 255, 0.18);
  --glass-card: rgba(255, 255, 255, 0.03);
  --glass-card-hover: rgba(255, 255, 255, 0.06);
  --glass-surface: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.015) 100%);
  
  /* Specular & Refraction — Apple Liquid Glass */
  --specular-top: inset 0 1px 0 0 rgba(255, 255, 255, 0.28);
  --specular-edge: inset 0 0 0 0.5px rgba(255, 255, 255, 0.14);
  --glass-glow: 0 8px 32px rgba(0, 0, 0, 0.45);
  --glass-shine: inset 0 1px 0 0 rgba(255, 255, 255, 0.28),
                 inset 0 0 0 0.5px rgba(255, 255, 255, 0.12);
  
  /* Precision Borders */
  --border-light: rgba(255, 255, 255, 0.1);
  --border-strong: rgba(255, 118, 0, 0.25);
  --border-glow: rgba(255, 118, 0, 0.3);

  /* Typography Colors */
  --t-1: #ffffff;
  --t-2: rgba(255, 255, 255, 0.72);
  --t-3: rgba(255, 255, 255, 0.45);
  --t-4: rgba(255, 255, 255, 0.2);

  /* Apple HSL Tailored Colors */
  --c-blue: #0A84FF;
  --c-blue-bg: rgba(10, 132, 255, 0.15);
  --c-green: #30D158;
  --c-green-bg: rgba(48, 209, 88, 0.15);
  --c-orange: #FF9F0A;
  --c-orange-bg: rgba(255, 159, 10, 0.15);
  --c-red: #FF453A;
  --c-red-bg: rgba(255, 69, 58, 0.15);
  --c-purple: #BF5AF2;
  --c-purple-bg: rgba(191, 90, 242, 0.15);
  --c-cyan: #64D2FF;
  --c-cyan-bg: rgba(100, 210, 255, 0.15);
  
  --accent: #FF7600;
  --accent-bg: rgba(255, 118, 0, 0.15);
  
  /* Radius System — iOS 27 Super-Rounded */
  --r-xs: 12px;
  --r-s: 18px;
  --r-m: 24px;
  --r-l: 32px;
  --r-xl: 42px;
  --r-full: 9999px;
  
  /* Safe Area */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  
  /* Easing */
  --spring: cubic-bezier(0.25, 1, 0.5, 1);
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --smooth: cubic-bezier(0.4, 0, 0.2, 1);
  
  /* Fonts */
  --ff-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --ff-serif: 'Playfair Display', Georgia, serif;
  --ff-title: 'Outfit', sans-serif;
  --ff-mono: 'JetBrains Mono', monospace;
}

/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html {
  font-size: 16px;
  background-color: var(--bg);
  color: var(--t-1);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  height: 100%;
}

body {
  font-family: var(--ff-sans);
  background-color: var(--bg);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  height: 100%;
}



/* ── Lock Screen Overlay ─────────────────────────────────── */
.lock-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100vw; height: 100vh;
  z-index: 9999;
  background: radial-gradient(ellipse at 50% 0%, rgba(20, 14, 30, 0.78) 0%, rgba(2, 1, 4, 0.94) 80%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 1;
  visibility: visible;
}

.lock-screen.unlocked {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.lock-card {
  width: 310px;
  padding: 32px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
  box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8),
              inset 0 1px 1px rgba(255, 255, 255, 0.1);
  border-radius: 32px;
}

.lock-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.lock-header .brand-logo {
  width: 44px;
  height: 44px;
  color: var(--accent);
  filter: drop-shadow(0 0 10px rgba(255, 107, 0, 0.3));
  margin-bottom: 6px;
}

.lock-title {
  font-family: var(--ff-title);
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--t-1);
  letter-spacing: -0.02em;
}

.lock-subtitle {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--t-4);
  letter-spacing: 0.02em;
}

.pin-dots {
  display: flex;
  gap: 16px;
  margin: 6px 0;
}

.pin-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1.5px solid rgba(255, 255, 255, 0.25);
  background: transparent;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.pin-dot.filled {
  background: var(--t-1);
  border-color: var(--t-1);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
  transform: scale(1.15);
}

.pin-dots.shake {
  animation: pinShake 0.4s ease;
}

@keyframes pinShake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}

.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
}

.pin-key {
  aspect-ratio: 1.25;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
  backdrop-filter: blur(15px) saturate(170%) brightness(1.1);
  -webkit-backdrop-filter: blur(15px) saturate(170%) brightness(1.1);
  font-family: var(--ff-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--t-2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2),
              inset 0 0 0 0.5px rgba(255, 255, 255, 0.08),
              0 3px 8px rgba(0, 0, 0, 0.2);
  transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
}

.pin-key:hover {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
  color: var(--t-1);
  border-color: rgba(255, 255, 255, 0.18);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35),
              0 6px 12px rgba(0, 0, 0, 0.3);
}

.pin-key:active {
  transform: scale(0.9);
}

.pin-key-empty {
  visibility: hidden;
  pointer-events: none;
}

.pin-key-del {
  background: transparent;
  border-color: transparent;
  color: var(--t-4);
}

.pin-key-del:hover {
  background: transparent;
  border-color: transparent;
  color: var(--t-2);
}

.lock-setup-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  animation: slideUpFade 0.3s ease;
}

.lock-setup-desc {
  font-size: 0.72rem;
  color: var(--t-3);
  line-height: 1.45;
  margin: 0 0 8px 0;
  text-align: center;
}

.lock-reset-link {
  font-size: 0.68rem;
  color: var(--t-4);
  cursor: pointer;
  text-decoration: underline;
  transition: color 0.2s;
  margin-top: 4px;
}

.lock-reset-link:hover {
  color: var(--accent);
}

.setup-icon-wrapper {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255, 118, 0, 0.08);
  border: 1px solid rgba(255, 118, 0, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
  box-shadow: 0 8px 20px rgba(255, 118, 0, 0.15),
              inset 0 1px 1px rgba(255, 255, 255, 0.1);
  animation: pulseOrange 2.5s infinite alternate;
}

.setup-lock-icon {
  width: 26px;
  height: 26px;
  color: var(--accent);
}

@keyframes pulseOrange {
  0% {
    box-shadow: 0 8px 20px rgba(255, 118, 0, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 118, 0, 0.2);
  }
  100% {
    box-shadow: 0 8px 30px rgba(255, 118, 0, 0.35),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 118, 0, 0.5);
  }
}

.lock-heatmap-preview {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: var(--r-m);
  margin: 4px 0 8px 0;
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
}

.lock-heatmap-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--t-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.lock-heatmap-legend {
  display: flex;
  gap: 4px;
}

.lock-heatmap-legend .legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 1px;
}

.lock-heatmap-legend .legend-dot.lvl-1 { background: rgba(255, 255, 255, 0.22); }
.lock-heatmap-legend .legend-dot.lvl-2 { background: rgba(255, 255, 255, 0.50); }
.lock-heatmap-legend .legend-dot.lvl-3 { background: rgba(255, 255, 255, 0.90); }

.lock-heatmap-body {
  display: flex;
  gap: 6px;
  width: 100%;
}

.lock-heatmap-days-labels {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 54px;
  margin-top: 14px;
  font-size: 0.55rem;
  color: var(--t-4);
  font-weight: 700;
  text-align: right;
  width: 10px;
  line-height: 6px;
}

.lock-heatmap-main {
  display: flex;
  flex-direction: column;
  position: relative;
  width: 100%;
}

.lock-heatmap-months {
  display: block;
  height: 14px;
  position: relative;
  font-size: 0.55rem;
  color: var(--t-3);
  font-weight: 800;
}

.lock-heatmap-month-label {
  position: absolute;
}

.lock-heatmap-grid {
  display: grid;
  grid-template-columns: repeat(24, 6px);
  grid-template-rows: repeat(7, 6px);
  grid-auto-flow: column;
  gap: 2px;
  width: max-content;
}

.lock-heatmap-dot {
  width: 6px;
  height: 6px;
  border-radius: 1px;
  background: rgba(255, 255, 255, 0.04);
  transition: transform 0.2s;
}

.lock-heatmap-dot.lvl-1 { background: rgba(255, 255, 255, 0.22); }
.lock-heatmap-dot.lvl-2 { background: rgba(255, 255, 255, 0.50); }
.lock-heatmap-dot.lvl-3 { background: rgba(255, 255, 255, 0.90); }

.lock-heatmap-dot:hover {
  transform: scale(1.4);
  z-index: 2;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
}

/* ── Custom Lock Input & Button (Inlined on startup) ── */
.lock-input {
  width: 100% !important;
  background: rgba(255, 255, 255, 0.03) !important;
  border: 1px solid rgba(255, 255, 255, 0.08) !important;
  border-radius: 14px !important;
  padding: 12px 16px !important;
  color: var(--t-1) !important;
  font-family: var(--ff-sans) !important;
  font-size: 0.9rem !important;
  font-weight: 500 !important;
  outline: none !important;
  transition: all 0.25s var(--spring) !important;
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.25),
              inset 0 0.5px 0.5px rgba(255, 255, 255, 0.05) !important;
  text-align: center !important;
}

.lock-input:focus {
  background: rgba(255, 255, 255, 0.06) !important;
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(255, 118, 0, 0.15),
              inset 0 2px 4px rgba(0, 0, 0, 0.25) !important;
}

.lock-input::placeholder {
  color: var(--t-4) !important;
}

.lock-btn {
  width: 100% !important;
  background: var(--accent) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  border-radius: 14px !important;
  padding: 12px 16px !important;
  color: #ffffff !important;
  font-family: var(--ff-sans) !important;
  font-size: 0.9rem !important;
  font-weight: 700 !important;
  cursor: pointer !important;
  transition: all 0.25s var(--spring) !important;
  box-shadow: 0 4px 12px rgba(255, 118, 0, 0.2),
              inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}

.lock-btn:hover {
  background: #ff8822 !important;
  box-shadow: 0 6px 16px rgba(255, 118, 0, 0.35),
              inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
  transform: translateY(-1px) !important;
}

.lock-btn:active {
  transform: translateY(1px) !important;
  box-shadow: 0 2px 6px rgba(255, 118, 0, 0.2) !important;
}

/* ── Premium settings list (iOS/Instagram/Strava style) ──── */
.settings-list-card {
  padding: 0 !important;
  overflow: hidden;
}
.settings-list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  cursor: pointer; transition: all 0.2s var(--spring);
  position: relative;
}
.settings-list-item:last-child {
  border-bottom: none;
}
.settings-list-item:hover {
  background: rgba(255, 255, 255, 0.03);
}
.settings-list-item:active {
  background: rgba(255, 255, 255, 0.05);
}
.settings-list-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.settings-list-icon svg {
  width: 20px; height: 20px;
}
.settings-list-content {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
}
.settings-list-title {
  font-size: 0.88rem; font-weight: 700; color: #fff;
}
.settings-list-desc {
  font-size: 0.72rem; color: var(--t-3); font-weight: 500;
}
.settings-list-chevron {
  color: var(--t-4); display: flex; align-items: center;
}
.settings-list-chevron svg {
  width: 18px; height: 18px; transition: transform 0.2s;
}
.settings-list-item:hover .settings-list-chevron svg {
  transform: translateX(2px);
  color: var(--t-3);
}
.settings-list-action-btn {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--r-xs);
  padding: 6px 12px; font-size: 0.72rem; font-weight: 700;
  color: #fff; cursor: pointer; transition: all 0.2s;
}
.settings-list-action-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.2);
}

/* iOS Settings Grouping Styles */
.settings-section-header {
  font-size: 0.68rem; font-weight: 800;
  color: var(--t-3); text-transform: uppercase;
  letter-spacing: 0.08em; margin: 18px 0 6px 12px;
}
.settings-list-right-group {
  display: flex; align-items: center; gap: 8px;
}
.settings-row-action-label {
  font-size: 0.72rem; font-weight: 700;
  color: rgba(255, 255, 255, 0.4);
  transition: color 0.2s;
}
.settings-list-item:hover .settings-row-action-label {
  color: #fff;
}
.settings-row-action-label.destructive-text {
  color: rgba(255, 69, 58, 0.6);
}
.settings-list-item:hover .settings-row-action-label.destructive-text {
  color: #FF453A;
}

/* ── Profile Hero Custom Overrides ──── */
#fbStatus {
  position: absolute !important;
  top: 14px !important;
  right: 14px !important;
  left: auto !important;
  width: auto !important;
  max-width: max-content !important;
  display: inline-flex !important;
  flex-shrink: 0;
}
.profile-edit-toggle:focus {
  outline: none !important;
  box-shadow: none !important;
}
.profile-edit .input-field {
  background: rgba(0, 0, 0, 0.4) !important;
  border: 1px solid rgba(255, 255, 255, 0.08) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3) !important;
}
.profile-edit .input-field:focus {
  border-color: var(--accent, #FF6B00) !important;
  background: rgba(0, 0, 0, 0.55) !important;
}
#bFbSave {
  background: linear-gradient(135deg, var(--accent, #FF6B00) 0%, #FF8822 100%) !important;
  box-shadow: 0 4px 16px rgba(255, 107, 0, 0.3) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  transition: all 0.25s var(--spring) !important;
  margin-top: 12px;
}
#bFbSave:hover {
  box-shadow: 0 6px 20px rgba(255, 107, 0, 0.45) !important;
  transform: translateY(-1px);
}
#bFbSave:active {
  transform: translateY(1px);
}

/* ── Mobile responsiveness overrides ── */
@media (max-width: 480px) {
  .profile-stats {
    display: grid !important;
    grid-template-columns: repeat(6, 1fr) !important;
    gap: 8px !important;
    padding: 0 !important;
  }
  .profile-stat {
    border-left: none !important;
    text-align: center !important;
    padding: 12px 4px !important;
  }
  /* Row 1 stats: Workouts, Volume, This Week span 2 columns */
  .profile-stat:nth-child(1),
  .profile-stat:nth-child(2),
  .profile-stat:nth-child(3) {
    grid-column: span 2 !important;
  }
  /* Row 2 stats: Followers, Following span 3 columns */
  .profile-stat:nth-child(4),
  .profile-stat:nth-child(5) {
    grid-column: span 3 !important;
  }
  
  /* Stack the form inputs vertically */
  .form-row {
    grid-template-columns: 1fr !important;
    gap: 14px !important;
    margin-bottom: 14px !important;
  }
}

.github-profile-link {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 700;
  color: var(--t-2); text-decoration: none;
  margin-top: 8px; transition: all 0.2s var(--spring);
}
.github-profile-link:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.15);
  color: #fff;
  transform: translateY(-0.5px);
}
.github-profile-link svg {
  color: var(--t-3);
  transition: color 0.2s;
}
.github-profile-link:hover svg {
  color: #fff;
}

/* Camera overlay when editing */
.profile-hero.editing .profile-avatar {
  position: relative;
  cursor: pointer;
}
.profile-hero.editing .profile-avatar::after {
  content: '📷';
  position: absolute; inset: 0;
  background: rgba(0, 0, 0, 0.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; color: #fff;
  opacity: 0.95; transition: all 0.2s var(--spring);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}
.profile-hero.editing .profile-avatar:hover::after {
  background: rgba(0, 0, 0, 0.65);
  transform: scale(1.03);
}

/* ═══════════════════════════════════════════════════════════════
   ── Adaptive Responsive System ──────────────────────────────────
   Mobile-first base above; these layer breakpoints on top:
     ≤360   small phones (anti-overflow)
     landscape short screens
     768–1023  tablet (centered wide column)
     ≥1024  desktop app-shell (left sidebar + wide content)
     ≥1280  extra multi-column density
   ═══════════════════════════════════════════════════════════════ */

/* Global safety: nothing should ever cause horizontal scroll */
html, body { max-width: 100%; overflow-x: hidden; }
.card, .glass-card, .view, .views-container { min-width: 0; }

/* ── Small phones ≤360px — kill overflow, tighten spacing ─────── */
@media (max-width: 360px) {
  .views-container { padding-left: 12px; padding-right: 12px; }
  .view-title { font-size: 1.62rem; }
  .view-subtitle { font-size: 0.76rem; }
  .bottom-bar { left: 8px; right: 8px; padding: 0 4px; }
  .bot-btn { width: 50px; font-size: 0.55rem; }
  .h2h-radar-wrap svg { max-width: 100%; height: auto; }
  .lb-podium, .friend-compare, .vol-insight-list, .pr-grid { min-width: 0; }
  .feed-chips { flex-wrap: wrap; }
  .modal { width: 94%; }
  .lb-metric-tabs, .lb-timeframe-tabs, .filter-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .lb-metric-tabs::-webkit-scrollbar, .lb-timeframe-tabs::-webkit-scrollbar, .filter-bar::-webkit-scrollbar { display: none; }
}

/* ── Landscape short screens — reclaim vertical space ─────────── */
@media (max-height: 500px) and (orientation: landscape) {
  .phone-frame { height: auto; min-height: 100dvh; }
  .app-header { padding-top: calc(10px + var(--sat)); padding-bottom: 10px; }
  .bottom-bar { height: 54px; bottom: calc(6px + var(--sab)); }
  .views-container { padding-bottom: calc(78px + var(--sab)); }
}

/* ── Tablet 768–1023 — centered wide column, no device chrome ─── */
@media (min-width: 768px) and (max-width: 1023px) {
  .phone-frame {
    width: min(760px, 94vw);
    height: 94vh;
    max-height: 1100px;
    min-height: 0;
    margin: 3vh auto;
    border-radius: 40px;
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 2px rgba(255, 255, 255, 0.12);
  }
  .views-container { padding: 26px 30px calc(104px + var(--sab)); }
  .insights-top-row { gap: 20px; }
  .pr-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── Desktop ≥1024 — app-shell: left sidebar + wide content ───── */
@media (min-width: 1024px) {
  body { padding: 0; }
  .phone-frame {
    display: grid;
    grid-template-columns: 248px minmax(0, 1fr);
    grid-template-rows: auto minmax(0, 1fr);
    grid-template-areas: "nav header" "nav main";
    width: min(1200px, 96vw);
    height: min(940px, 94vh);
    max-height: none;
    min-height: 0;
    margin: auto;
    border-radius: 30px;
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 40px 110px rgba(0, 0, 0, 0.92),
                0 0 90px rgba(100, 60, 200, 0.05),
                inset 0 1px 2px rgba(255, 255, 255, 0.12);
  }

  /* Header spans the content column only; drop the redundant wordmark */
  .app-header {
    grid-area: header;
    justify-content: flex-end;
    gap: 12px;
    padding: calc(20px + var(--sat)) 32px 16px 32px;
  }
  .app-header .brand { display: none; }

  /* Scrolling content region */
  .views-container {
    grid-area: main;
    padding: 26px 34px 40px 34px;
  }

  /* Bottom bar → full-height left sidebar */
  .bottom-bar {
    grid-area: nav;
    position: relative;
    inset: auto;
    left: auto; right: auto; bottom: auto; top: auto;
    width: auto; height: auto;
    flex-direction: column;
    justify-content: flex-start;
    align-items: stretch;
    gap: 6px;
    padding: 22px 14px;
    border: none;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 0;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.012));
    box-shadow: none;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .bottom-bar::-webkit-scrollbar { display: none; }
  .bottom-bar::before {
    content: "Asca Gym";
    font-family: var(--ff-title);
    font-weight: 800;
    font-size: 1.08rem;
    letter-spacing: -0.01em;
    color: var(--t-1);
    padding: 8px 16px 20px 16px;
  }

  .bot-btn {
    flex-direction: row;
    justify-content: flex-start;
    gap: 14px;
    width: 100%;
    height: auto;
    padding: 13px 16px;
    border-radius: 16px;
    font-size: 0.9rem;
    color: var(--t-2);
    transition: background 0.2s var(--spring), color 0.2s var(--spring);
  }
  .bot-btn span { font-size: 0.9rem; font-weight: 700; }
  .bot-btn .tab-icon { width: 22px; height: 22px; }
  .bot-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--t-1); }
  .bot-btn.on {
    background: linear-gradient(135deg, rgba(255, 118, 0, 0.16), rgba(255, 118, 0, 0.05));
    box-shadow: inset 0 0 0 1px rgba(255, 118, 0, 0.28);
    color: #fff;
  }
  .bot-btn.on .tab-icon { transform: none; color: var(--accent); }
  .nav-lens { display: none !important; }

  /* Rest timer floats inside the content column, clear of the sidebar */
  .global-timer-bar { left: auto; right: 34px; width: min(520px, calc(100% - 296px)); bottom: 26px; }

  /* Give internal grids room to breathe */
  .insights-top-row { gap: 22px; }
  .pr-grid { grid-template-columns: repeat(3, 1fr); }
  .profile-stats { padding: 0; }
}

/* ── Wide desktop ≥1280 — genuine two-column content density ──── */
@media (min-width: 1280px) {
  .phone-frame { grid-template-columns: 264px minmax(0, 1fr); }
  /* Feed + history flow into two columns */
  #friendRecent { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
  .timeline { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .pr-grid { grid-template-columns: repeat(4, 1fr); }
}

  function injectScript(code) {
    const s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
  }

  // Unpack the app behind the login overlay; app.js owns the login
  // flow (Firebase Auth) and removes the overlay after sign-in.
  function boot() {
    const payload = JSON.parse(decodeURIComponent(escape(atob(PAYLOAD_B64))));

    const style = document.createElement('style');
    style.textContent = payload.css;
    document.head.appendChild(style);

    const wrapper = document.createElement('div');
    wrapper.innerHTML = payload.html;
    while (wrapper.firstChild) {
      document.body.appendChild(wrapper.firstChild);
    }

    injectScript(payload.data);
    if (payload.fsync) injectScript(payload.fsync);
    injectScript(payload.app);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
