<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="description" content="Asca Gym — Elite Liquid Glass Tracker">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Asca Gym</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230A84FF' stroke-width='2'><path d='M6 3h12l4 6-10 13L2 9z'/></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

:root {
  /* Pitch Black OLED Base */
  --bg: #000000;
  
  /* Apple Liquid Glass — True Translucent System */
  --glass-1: rgba(255, 255, 255, 0.03);
  --glass-2: rgba(255, 255, 255, 0.05);
  --glass-3: rgba(255, 255, 255, 0.09);
  --glass-hover: rgba(255, 255, 255, 0.12);
  --glass-active: rgba(255, 255, 255, 0.18);
  --glass-card: rgba(255, 255, 255, 0.03);
  --glass-card-hover: rgba(255, 255, 255, 0.06);
  --glass-surface: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.015) 100%);
  
  /* Specular & Refraction — Apple Liquid Glass */
  --specular-top: inset 0 1px 0 0 rgba(255, 255, 255, 0.28);
  --specular-edge: inset 0 0 0 0.5px rgba(255, 255, 255, 0.14);
  --glass-glow: 0 8px 32px rgba(0, 0, 0, 0.45);
  --glass-shine: inset 0 1px 0 0 rgba(255, 255, 255, 0.28),
                 inset 0 0 0 0.5px rgba(255, 255, 255, 0.12);
  
  /* Precision Borders */
  --border-light: rgba(255, 255, 255, 0.1);
  --border-strong: rgba(255, 118, 0, 0.25);
  --border-glow: rgba(255, 118, 0, 0.3);

  /* Typography Colors */
  --t-1: #ffffff;
  --t-2: rgba(255, 255, 255, 0.72);
  --t-3: rgba(255, 255, 255, 0.45);
  --t-4: rgba(255, 255, 255, 0.2);

  /* Apple HSL Tailored Colors */
  --c-blue: #0A84FF;
  --c-blue-bg: rgba(10, 132, 255, 0.15);
  --c-green: #30D158;
  --c-green-bg: rgba(48, 209, 88, 0.15);
  --c-orange: #FF9F0A;
  --c-orange-bg: rgba(255, 159, 10, 0.15);
  --c-red: #FF453A;
  --c-red-bg: rgba(255, 69, 58, 0.15);
  --c-purple: #BF5AF2;
  --c-purple-bg: rgba(191, 90, 242, 0.15);
  --c-cyan: #64D2FF;
  --c-cyan-bg: rgba(100, 210, 255, 0.15);
  
  --accent: #FF7600;
  --accent-bg: rgba(255, 118, 0, 0.15);
  
  /* Radius System — iOS 27 Super-Rounded */
  --r-xs: 12px;
  --r-s: 18px;
  --r-m: 24px;
  --r-l: 32px;
  --r-xl: 42px;
  --r-full: 9999px;
  
  /* Safe Area */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  
  /* Easing */
  --spring: cubic-bezier(0.25, 1, 0.5, 1);
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --smooth: cubic-bezier(0.4, 0, 0.2, 1);
  
  /* Fonts */
  --ff-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --ff-serif: 'Playfair Display', Georgia, serif;
  --ff-title: 'Outfit', sans-serif;
  --ff-mono: 'JetBrains Mono', monospace;
}

/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html {
  font-size: 16px;
  background-color: var(--bg);
  color: var(--t-1);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  height: 100%;
}

body {
  font-family: var(--ff-sans);
  background-color: var(--bg);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  height: 100%;
}



/* ── Lock Screen Overlay ─────────────────────────────────── */
.lock-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100vw; height: 100vh;
  z-index: 9999;
  background: radial-gradient(ellipse at 50% 0%, rgba(20, 14, 30, 0.78) 0%, rgba(2, 1, 4, 0.94) 80%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 1;
  visibility: visible;
}

.lock-screen.unlocked {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.lock-card {
  width: 310px;
  padding: 32px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
  box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8),
              inset 0 1px 1px rgba(255, 255, 255, 0.1);
  border-radius: 32px;
}

.lock-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.lock-header .brand-logo {
  width: 44px;
  height: 44px;
  color: var(--accent);
  filter: drop-shadow(0 0 10px rgba(255, 107, 0, 0.3));
  margin-bottom: 6px;
}

.lock-title {
  font-family: var(--ff-title);
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--t-1);
  letter-spacing: -0.02em;
}

.lock-subtitle {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--t-4);
  letter-spacing: 0.02em;
}

.pin-dots {
  display: flex;
  gap: 16px;
  margin: 6px 0;
}

.pin-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1.5px solid rgba(255, 255, 255, 0.25);
  background: transparent;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.pin-dot.filled {
  background: var(--t-1);
  border-color: var(--t-1);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
  transform: scale(1.15);
}

.pin-dots.shake {
  animation: pinShake 0.4s ease;
}

@keyframes pinShake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}

.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
}

.pin-key {
  aspect-ratio: 1.25;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
  backdrop-filter: blur(15px) saturate(170%) brightness(1.1);
  -webkit-backdrop-filter: blur(15px) saturate(170%) brightness(1.1);
  font-family: var(--ff-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--t-2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2),
              inset 0 0 0 0.5px rgba(255, 255, 255, 0.08),
              0 3px 8px rgba(0, 0, 0, 0.2);
  transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
}

.pin-key:hover {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 100%);
  color: var(--t-1);
  border-color: rgba(255, 255, 255, 0.18);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35),
              0 6px 12px rgba(0, 0, 0, 0.3);
}

.pin-key:active {
  transform: scale(0.9);
}

.pin-key-empty {
  visibility: hidden;
  pointer-events: none;
}

.pin-key-del {
  background: transparent;
  border-color: transparent;
  color: var(--t-4);
}

.pin-key-del:hover {
  background: transparent;
  border-color: transparent;
  color: var(--t-2);
}

.lock-setup-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  animation: slideUpFade 0.3s ease;
}

.lock-setup-desc {
  font-size: 0.72rem;
  color: var(--t-3);
  line-height: 1.45;
  margin: 0 0 8px 0;
  text-align: center;
}

.lock-reset-link {
  font-size: 0.68rem;
  color: var(--t-4);
  cursor: pointer;
  text-decoration: underline;
  transition: color 0.2s;
  margin-top: 4px;
}

.lock-reset-link:hover {
  color: var(--accent);
}

.setup-icon-wrapper {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255, 118, 0, 0.08);
  border: 1px solid rgba(255, 118, 0, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
  box-shadow: 0 8px 20px rgba(255, 118, 0, 0.15),
              inset 0 1px 1px rgba(255, 255, 255, 0.1);
  animation: pulseOrange 2.5s infinite alternate;
}

.setup-lock-icon {
  width: 26px;
  height: 26px;
  color: var(--accent);
}

@keyframes pulseOrange {
  0% {
    box-shadow: 0 8px 20px rgba(255, 118, 0, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 118, 0, 0.2);
  }
  100% {
    box-shadow: 0 8px 30px rgba(255, 118, 0, 0.35),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 118, 0, 0.5);
  }
}

.lock-heatmap-preview {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: var(--r-m);
  margin: 4px 0 8px 0;
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
}

.lock-heatmap-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--t-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.lock-heatmap-legend {
  display: flex;
  gap: 4px;
}

.lock-heatmap-legend .legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 1px;
}

.lock-heatmap-legend .legend-dot.lvl-1 { background: rgba(255, 255, 255, 0.22); }
.lock-heatmap-legend .legend-dot.lvl-2 { background: rgba(255, 255, 255, 0.50); }
.lock-heatmap-legend .legend-dot.lvl-3 { background: rgba(255, 255, 255, 0.90); }

.lock-heatmap-body {
  display: flex;
  gap: 6px;
  width: 100%;
}

.lock-heatmap-days-labels {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 54px;
  margin-top: 14px;
  font-size: 0.55rem;
  color: var(--t-4);
  font-weight: 700;
  text-align: right;
  width: 10px;
  line-height: 6px;
}

.lock-heatmap-main {
  display: flex;
  flex-direction: column;
  position: relative;
  width: 100%;
}

.lock-heatmap-months {
  display: block;
  height: 14px;
  position: relative;
  font-size: 0.55rem;
  color: var(--t-3);
  font-weight: 800;
}

.lock-heatmap-month-label {
  position: absolute;
}

.lock-heatmap-grid {
  display: grid;
  grid-template-columns: repeat(24, 6px);
  grid-template-rows: repeat(7, 6px);
  grid-auto-flow: column;
  gap: 2px;
  width: max-content;
}

.lock-heatmap-dot {
  width: 6px;
  height: 6px;
  border-radius: 1px;
  background: rgba(255, 255, 255, 0.04);
  transition: transform 0.2s;
}

.lock-heatmap-dot.lvl-1 { background: rgba(255, 255, 255, 0.22); }
.lock-heatmap-dot.lvl-2 { background: rgba(255, 255, 255, 0.50); }
.lock-heatmap-dot.lvl-3 { background: rgba(255, 255, 255, 0.90); }

.lock-heatmap-dot:hover {
  transform: scale(1.4);
  z-index: 2;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
}

/* ── Custom Lock Input & Button (Inlined on startup) ── */
.lock-input {
  width: 100% !important;
  background: rgba(255, 255, 255, 0.03) !important;
  border: 1px solid rgba(255, 255, 255, 0.08) !important;
  border-radius: 14px !important;
  padding: 12px 16px !important;
  color: var(--t-1) !important;
  font-family: var(--ff-sans) !important;
  font-size: 0.9rem !important;
  font-weight: 500 !important;
  outline: none !important;
  transition: all 0.25s var(--spring) !important;
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.25),
              inset 0 0.5px 0.5px rgba(255, 255, 255, 0.05) !important;
  text-align: center !important;
}

.lock-input:focus {
  background: rgba(255, 255, 255, 0.06) !important;
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(255, 118, 0, 0.15),
              inset 0 2px 4px rgba(0, 0, 0, 0.25) !important;
}

.lock-input::placeholder {
  color: var(--t-4) !important;
}

.lock-btn {
  width: 100% !important;
  background: var(--accent) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  border-radius: 14px !important;
  padding: 12px 16px !important;
  color: #ffffff !important;
  font-family: var(--ff-sans) !important;
  font-size: 0.9rem !important;
  font-weight: 700 !important;
  cursor: pointer !important;
  transition: all 0.25s var(--spring) !important;
  box-shadow: 0 4px 12px rgba(255, 118, 0, 0.2),
              inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}

.lock-btn:hover {
  background: #ff8822 !important;
  box-shadow: 0 6px 16px rgba(255, 118, 0, 0.35),
              inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
  transform: translateY(-1px) !important;
}

.lock-btn:active {
  transform: translateY(1px) !important;
  box-shadow: 0 2px 6px rgba(255, 118, 0, 0.2) !important;
}

  </style>
</head>

  function rc4Decrypt(key, hex) {
    let s = [], j = 0, x, utf8 = '';
    for (let i = 0; i < 256; i++) s[i] = i;
    for (let i = 0; i < 256; i++) {
      j = (j + s[i] + key.charCodeAt(i % key.length)) % 256;
      x = s[i]; s[i] = s[j]; s[j] = x;
    }
    let i = 0; j = 0;
    for (let y = 0; y < hex.length; y += 2) {
      i = (i + 1) % 256;
      j = (j + s[i]) % 256;
      x = s[i]; s[i] = s[j]; s[j] = x;
      const code = parseInt(hex.substr(y, 2), 16) ^ s[(s[i] + s[j]) % 256];
      utf8 += String.fromCharCode(code);
    }
    try {
      return decodeURIComponent(escape(utf8));
    } catch (e) {
      return null;
    }
  }

  function injectScript(code) {
    const s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
  }

  function unlockAndLaunch(pin) {
    const salt = localStorage.getItem('asca_gym_salt') || '';
    const decrypted = rc4Decrypt(pin + salt, ENCRYPTED_PAYLOAD);
    if (!decrypted) return false;
    try {
      const payload = JSON.parse(decrypted);
      if (payload.css && payload.html && payload.app) {
        // Save session pin
        sessionStorage.setItem('asca_gym_pin', pin);

        // Inject CSS
        const style = document.createElement('style');
        style.textContent = payload.css;
        document.head.appendChild(style);

        // Inject HTML
        const wrapper = document.createElement('div');
        wrapper.innerHTML = payload.html;
        while (wrapper.firstChild) {
          document.body.appendChild(wrapper.firstChild);
        }

        // Expose data globally so scripts can load it
        injectScript(payload.data);
        injectScript(payload.sync);
        injectScript(payload.app);

        // Remove lockscreen overlay
        document.getElementById('lockScreen').classList.add('unlocked');
        return true;
      }
    } catch (e) {}
    return false;
  }

  function bindLock() {
    const lockScreen = document.getElementById('lockScreen');
    const pinDotsContainer = document.getElementById('pinDots');
    if (!lockScreen || !pinDotsContainer) return;

    const lockSubtitle = document.getElementById('lockSubtitle');
    const lockSetupForm = document.getElementById('lockSetupForm');
    const saltInput = document.getElementById('saltInput');
    const btnLinkDevice = document.getElementById('btnLinkDevice');
    const pinKeypad = document.getElementById('pinKeypad');
    const lockResetLink = document.getElementById('lockResetLink');

    function checkSaltSetup() {
      const salt = localStorage.getItem('asca_gym_salt');
      if (!salt) {
        if (lockSetupForm) lockSetupForm.style.display = 'flex';
        if (pinDotsContainer) pinDotsContainer.style.display = 'none';
        if (pinKeypad) pinKeypad.style.display = 'none';
        if (lockResetLink) lockResetLink.style.display = 'none';
        if (lockSubtitle) lockSubtitle.textContent = 'Device Setup Required';
      } else {
        if (lockSetupForm) lockSetupForm.style.display = 'none';
        if (pinDotsContainer) pinDotsContainer.style.display = 'flex';
        if (pinKeypad) pinKeypad.style.display = 'grid';
        if (lockResetLink) lockResetLink.style.display = 'block';
        if (lockSubtitle) lockSubtitle.textContent = 'Enter PIN to access';
      }
    }

    checkSaltSetup();

    if (btnLinkDevice && saltInput) {
      function handleLink() {
        const val = saltInput.value.trim();
        if (!val) {
          alert('Please enter a non-empty passphrase salt.');
          return;
        }
        localStorage.setItem('asca_gym_salt', val);
        saltInput.value = '';
        checkSaltSetup();
      }
      btnLinkDevice.addEventListener('click', handleLink);
      saltInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLink();
      });
    }

    if (lockResetLink) {
      lockResetLink.addEventListener('click', () => {
        if (confirm('Reset device link? This will clear your saved salt and lock the application.')) {
          localStorage.removeItem('asca_gym_salt');
          sessionStorage.removeItem('asca_gym_pin');
          location.reload();
        }
      });
    }

    // Check saved session PIN
    const savedPin = sessionStorage.getItem('asca_gym_pin');
    if (savedPin) {
      if (unlockAndLaunch(savedPin)) {
        return;
      } else {
        sessionStorage.removeItem('asca_gym_pin');
      }
    }

    const dots = pinDotsContainer.querySelectorAll('.pin-dot');
    let currentPin = '';

    function updateDots() {
      dots.forEach((dot, idx) => {
        dot.classList.toggle('filled', idx < currentPin.length);
      });
    }

    function handleInput(val) {
      if (isShaking) return;
      if (currentPin.length < 4) {
        currentPin += val;
        updateDots();

        if (currentPin.length === 4) {
          if (unlockAndLaunch(currentPin)) {
            // Unlocked successfully!
          } else {
            isShaking = true;
            pinDotsContainer.classList.add('shake');
            setTimeout(() => {
              pinDotsContainer.classList.remove('shake');
              currentPin = '';
              updateDots();
              isShaking = false;
            }, 400);
          }
        }
      }
    }

    function handleDelete() {
      if (isShaking) return;
      currentPin = currentPin.slice(0, -1);
      updateDots();
    }

    lockScreen.querySelectorAll('.pin-key').forEach(key => {
      key.addEventListener('click', () => {
        if (key.classList.contains('pin-key-del')) {
          handleDelete();
        } else if (key.classList.contains('pin-key-empty')) {
          // do nothing
        } else {
          const val = key.textContent.trim();
          if (val) handleInput(val);
        }
      });
    });

    document.addEventListener('keydown', e => {
      if (lockScreen.classList.contains('unlocked')) return;
      const salt = localStorage.getItem('asca_gym_salt');
      if (!salt) return;

      if (e.key >= '0' && e.key <= '9') {
        handleInput(e.key);
      } else if (e.key === 'Backspace') {
        handleDelete();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindLock);
  } else {
    bindLock();
  }
})();
</script>
</body>
</html>
