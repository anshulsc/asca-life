/* ═══════════════════════════════════════════════════════════════
   ── Adaptive Responsive System ──────────────────────────────────
   Mobile-first base above; these layer breakpoints on top:
     ≤360   small phones (anti-overflow)
     landscape short screens
     768–1023  tablet (centered wide column)
     ≥1024  desktop app-shell (left sidebar + wide content)
     ≥1280  extra multi-column density
   ═══════════════════════════════════════════════════════════════ */

/* Global safety: nothing should ever cause horizontal scroll */
html, body { max-width: 100%; overflow-x: hidden; }
.card, .glass-card, .view, .views-container { min-width: 0; }

/* ── Small phones ≤360px — kill overflow, tighten spacing ─────── */
@media (max-width: 360px) {
  .views-container { padding-left: 12px; padding-right: 12px; }
  .view-title { font-size: 1.62rem; }
  .view-subtitle { font-size: 0.76rem; }
  .bottom-bar { left: 8px; right: 8px; padding: 0 4px; }
  .bot-btn { width: 50px; font-size: 0.55rem; }
  .h2h-radar-wrap svg { max-width: 100%; height: auto; }
  .lb-podium, .friend-compare, .vol-insight-list, .pr-grid { min-width: 0; }
  .feed-chips { flex-wrap: wrap; }
  .modal { width: 94%; }
  .lb-metric-tabs, .lb-timeframe-tabs, .filter-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .lb-metric-tabs::-webkit-scrollbar, .lb-timeframe-tabs::-webkit-scrollbar, .filter-bar::-webkit-scrollbar { display: none; }
}

/* ── Landscape short screens — reclaim vertical space ─────────── */
@media (max-height: 500px) and (orientation: landscape) {
  .phone-frame { height: auto; min-height: 100dvh; }
  .app-header { padding-top: calc(10px + var(--sat)); padding-bottom: 10px; }
  .bottom-bar { height: 54px; bottom: calc(6px + var(--sab)); }
  .views-container { padding-bottom: calc(78px + var(--sab)); }
}

/* ── Tablet 768–1023 — centered wide column, no device chrome ─── */
@media (min-width: 768px) and (max-width: 1023px) {
  .phone-frame {
    width: min(760px, 94vw);
    height: 94vh;
    max-height: 1100px;
    min-height: 0;
    margin: 3vh auto;
    border-radius: 18px;
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 2px rgba(255, 255, 255, 0.12);
  }
  .views-container { padding: 26px 30px calc(104px + var(--sab)); }
  .insights-top-row { gap: 20px; }
  .pr-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── Desktop ≥1024 — app-shell: left sidebar + wide content ───── */
@media (min-width: 1024px) {
  body { padding: 0; }
  .phone-frame {
    display: grid;
    grid-template-columns: 248px minmax(0, 1fr);
    grid-template-rows: auto minmax(0, 1fr);
    grid-template-areas: "nav header" "nav main";
    width: min(1200px, 96vw);
    height: min(940px, 94vh);
    max-height: none;
    min-height: 0;
    margin: auto;
    border-radius: 16px;
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 40px 110px rgba(0, 0, 0, 0.92),
                0 0 90px rgba(100, 60, 200, 0.05),
                inset 0 1px 2px rgba(255, 255, 255, 0.12);
  }

  /* Header spans the content column only; drop the redundant wordmark */
  .app-header {
    grid-area: header;
    justify-content: flex-end;
    gap: 12px;
    padding: calc(20px + var(--sat)) 32px 16px 32px;
  }
  .app-header .brand { display: none; }

  /* Scrolling content region */
  .views-container {
    grid-area: main;
    padding: 26px 34px 40px 34px;
  }

  /* Bottom bar → full-height left sidebar */
  .bottom-bar {
    grid-area: nav;
    position: relative;
    inset: auto;
    left: auto; right: auto; bottom: auto; top: auto;
    width: auto; height: auto;
    flex-direction: column;
    justify-content: flex-start;
    align-items: stretch;
    gap: 6px;
    padding: 22px 14px;
    border: none;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 0;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.012));
    box-shadow: none;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .bottom-bar::-webkit-scrollbar { display: none; }
  .bottom-bar::before {
    content: "Asca Gym";
    font-family: var(--ff-title);
    font-weight: 800;
    font-size: 1.08rem;
    letter-spacing: -0.01em;
    color: var(--t-1);
    padding: 8px 16px 20px 16px;
  }

  .bot-btn {
    flex-direction: row;
    justify-content: flex-start;
    gap: 14px;
    width: 100%;
    height: auto;
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 0.9rem;
    color: var(--t-2);
    transition: background 0.2s var(--spring), color 0.2s var(--spring);
  }
  .bot-btn span { font-size: 0.9rem; font-weight: 700; }
  .bot-btn .tab-icon { width: 22px; height: 22px; }
  .bot-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--t-1); }
  .bot-btn.on {
    background: linear-gradient(135deg, rgba(255, 118, 0, 0.16), rgba(255, 118, 0, 0.05));
    box-shadow: inset 0 0 0 1px rgba(255, 118, 0, 0.28);
    color: #fff;
  }
  .bot-btn.on .tab-icon { transform: none; color: var(--accent); }
  .nav-lens { display: none !important; }

  /* Rest timer floats inside the content column, clear of the sidebar */
  .global-timer-bar { left: auto; right: 34px; width: min(520px, calc(100% - 296px)); bottom: 26px; }

  /* Give internal grids room to breathe */
  .insights-top-row { gap: 22px; }
  .pr-grid { grid-template-columns: repeat(3, 1fr); }
  .profile-stats { padding: 0; }
}

/* ── Wide desktop ≥1280 — genuine two-column content density ──── */
@media (min-width: 1280px) {
  .phone-frame { grid-template-columns: 264px minmax(0, 1fr); }
  /* Feed + history flow into two columns */
  #friendRecent { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
  .timeline { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .pr-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ── Progress Pics (Cloud Storage timeline) ── */
.ppx-card { padding: 16px; }
.ppx-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.ppx-head-txt { flex: 1; font-size: 0.76rem; color: var(--t-3); line-height: 1.4; }

  font-size: 0.78rem; cursor: pointer;

.ppx-add-btn svg { width: 15px; height: 15px; }

.ppx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.ppx-thumb {
  position: relative; aspect-ratio: 3 / 4;
  border-radius: var(--r-s); overflow: hidden; cursor: pointer;

  position: absolute; left: 0; right: 0; bottom: 0;

.ppx-view-sub { font-size: 0.78rem; color: var(--t-3); margin-bottom: 14px; }
.ppx-view-del { color: #ff5a5a; }

<script>
/* ═══════════════════════════════════════════════════════════════
   ASCA GYM TRACKER — Firebase Backend Module (Auth + Realtime DB)

   The app's single backend, spoken to over plain REST — no SDK
   and no external <script>, so it works from the static GitHub
   Pages bundle.

   SINGLE SHARED BACKEND: every user of the site talks to the
   same Firebase project, baked in below at build time. Users
   are real Firebase Authentication accounts (email + password);
   the old PIN + salt scheme is gone. Sign-in state persists in
   localStorage and tokens are refreshed automatically.

   Each user owns one Realtime Database node at gym/{syncId}:
     { uid, ts, name, avatar, github, following: [ids],
       workouts: { "YYYY-MM-DD": { dayType, exercises: [...] } } }
   Workouts are stored day-wise (date-keyed), so the data is
   directly browsable in the RTDB console. Old docs that still
   hold a compressed `blob` progress code are decoded by app.js
   on read. Security rules require sign-in to read and ownership
   (uid) to write. RTDB is the source of truth; browser
   localStorage is only a cache. A parallel directory/{syncId}
   node holds { name, ts } for lightweight user listings.
   ═══════════════════════════════════════════════════════════════ */

const FirebaseSync = (() => {
  // ── The one shared backend (fill in after creating the project) ──
  const FIREBASE_PROJECT_ID = 'asca-gym';
  const FIREBASE_API_KEY = 'AIzaSyCAvGn9blvhx-sGINHwbasYcx8LH1A-4mk';
  const FIREBASE_RTDB_URL = 'https://asca-gym-default-rtdb.firebaseio.com';

  // Users sign in with a username; Firebase Auth only speaks email, so
  // usernames are mapped to a synthetic address on this fake domain.
  // Existing full-email accounts still work (input containing @ passes
  // through untouched).
  const USERNAME_DOMAIN = 'asca-gym.app';

  function usernameToEmail(name) {
    name = (name || '').trim().toLowerCase();
    if (name.includes('@')) return name;
    if (!/^[a-z0-9._-]+$/.test(name)) {
      throw new Error('Usernames can only use letters, numbers, dots, dashes and underscores');
    }
    return name + '@' + USERNAME_DOMAIN;
  }

  function emailToUsername(email) {
    return (email || '').split('@')[0];
  }

  const CONFIG_KEY = 'asca_gym_firebase_config';  // sync ids + friend name
  const AUTH_KEY = 'asca_gym_auth';               // tokens + user info

  let config = {
    userId: '',        // my node id under gym/, e.g. "anshul"
    displayName: '',   // shown to followers; defaults to userId
    avatar: '',        // small base64 data-URI profile photo
    bio: '',           // short profile tagline
    github: '',        // optional GitHub username
    following: []      // Strava-style follow list: [{ id, name }]
  };

  // { uid, email, idToken, refreshToken, exp } or null
  let auth = null;

  // ── Config (sync identity) ───────────────────────────────
  function loadConfig() {
    try {
      const saved = localStorage.getItem(CONFIG_KEY);
      if (saved) {
        const s = JSON.parse(saved);
        config.userId = s.userId || '';
        config.displayName = s.displayName || '';
        config.avatar = s.avatar || '';
        config.bio = s.bio || '';
        config.github = s.github || '';
        if (Array.isArray(s.following)) {
          config.following = s.following
            .filter(f => f && f.id)
            .map(f => ({ id: String(f.id), name: f.name || '' }));
        } else if (s.friendId) {
          // Migrate the old single-friend config into the follow list
          config.following = [{ id: s.friendId, name: (s.friendName && s.friendName !== 'Friend') ? s.friendName : '' }];
          saveConfig();
        }
      }
    } catch (e) {
      console.warn('Failed to load firebase config:', e);
    }
    return config;
  }

  function saveConfig() {
    try {
      localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    } catch (e) {
      console.warn('Failed to save firebase config:', e);
    }
  }

  function updateConfig(partial) {
    config = { ...config, ...partial };
    saveConfig();
    return getConfig();
  }

  function hasBackend() {
    return !!(FIREBASE_PROJECT_ID && FIREBASE_API_KEY);
  }

  // ── Auth state ───────────────────────────────────────────
  function loadAuth() {
    try {
      const saved = localStorage.getItem(AUTH_KEY);
      auth = saved ? JSON.parse(saved) : null;
    } catch (_) {
      auth = null;
    }
    return auth;
  }

  function saveAuth() {
    try {
      if (auth) localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
      else localStorage.removeItem(AUTH_KEY);
    } catch (_) {}
  }

  function setAuthFromTokenResponse(d) {
    auth = {
      uid: d.localId || d.user_id || (auth && auth.uid) || '',
      email: d.email || (auth && auth.email) || '',
      idToken: d.idToken || d.id_token,
      refreshToken: d.refreshToken || d.refresh_token,
      exp: Date.now() + (parseInt(d.expiresIn || d.expires_in || 3600, 10) - 120) * 1000
    };
    saveAuth();
    return auth;
  }

  function authErrorMessage(code) {
    const map = {
      EMAIL_NOT_FOUND: 'No account with that username',
      INVALID_PASSWORD: 'Wrong password',
      INVALID_LOGIN_CREDENTIALS: 'Wrong username or password',
      EMAIL_EXISTS: 'That username is already taken',
      WEAK_PASSWORD: 'Password must be at least 6 characters',
      INVALID_EMAIL: 'That username is not valid',
      USER_DISABLED: 'This account has been disabled',
      TOO_MANY_ATTEMPTS_TRY_LATER: 'Too many attempts — try again later',
      OPERATION_NOT_ALLOWED: 'Email/password sign-in is not enabled in Firebase',
      ADMIN_ONLY_OPERATION: 'New sign-ups are disabled'
    };
    const key = String(code || '').split(' ')[0].split(':')[0];
    return map[key] || ('Sign-in failed: ' + code);
  }

  async function identityCall(endpoint, body) {
    if (!hasBackend()) throw new Error('This build has no Firebase backend configured');
    const res = await fetch(
      `https://identitytoolkit.googleapis.com/v1/accounts:${endpoint}?key=${encodeURIComponent(FIREBASE_API_KEY)}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(authErrorMessage(data.error && data.error.message));
    return data;
  }

  async function signUp(username, password) {
    const email = usernameToEmail(username);
    const d = await identityCall('signUp', { email, password, returnSecureToken: true });
    return setAuthFromTokenResponse(d);
  }

  async function signIn(username, password) {
    const email = usernameToEmail(username);
    const d = await identityCall('signInWithPassword', { email, password, returnSecureToken: true });
    return setAuthFromTokenResponse(d);
  }

  function signOut() {
    auth = null;
    saveAuth();
  }

  // Coalesce concurrent refreshes: many calls (readDoc, listUsers, each
  // EventSource, fbPullFollowing) can hit getIdToken at once on boot. Without
  // this they'd each POST to securetoken, racing and rotating the refresh
  // token — one in-flight request serves them all.
  let refreshInFlight = null;
  function refreshToken() {
    if (!auth || !auth.refreshToken) return Promise.reject(new Error('Not signed in'));
    if (refreshInFlight) return refreshInFlight;
    const p = (async () => {
      const res = await fetch(
        `https://securetoken.googleapis.com/v1/token?key=${encodeURIComponent(FIREBASE_API_KEY)}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'grant_type=refresh_token&refresh_token=' + encodeURIComponent(auth.refreshToken)
        }
      );
      const data = await res.json();
      if (!res.ok) {
        // Refresh token revoked/expired — session is dead
        signOut();
        throw new Error('Session expired — please sign in again');
      }
      return setAuthFromTokenResponse(data);
    })();
    refreshInFlight = p;
    // Release the handle once settled so the next expiry can refresh again;
    // the identity check avoids clearing a newer refresh started meanwhile.
    p.catch(() => {}).then(() => { if (refreshInFlight === p) refreshInFlight = null; });
    return p;
  }

  async function getIdToken() {
    if (!auth) loadAuth();
    if (!auth) throw new Error('Not signed in');
    if (Date.now() >= (auth.exp || 0)) await refreshToken();
    return auth.idToken;
  }

  // Restore a persisted session on page load.
  // Returns { uid, email } when signed in, 'offline' when we have a
  // saved session but the network is unreachable, or null when the
  // user must sign in.
  async function restoreSession() {
    loadAuth();
    if (!hasBackend() || !auth || !auth.refreshToken) return null;
    if (Date.now() < (auth.exp || 0)) return getUser();
    try {
      await refreshToken();
      return getUser();
    } catch (e) {
      if (!auth) return null;          // refresh rejected → signed out
      return 'offline';                // network error → allow cached use
    }
  }

  function getUser() {
    if (!auth) loadAuth();
    return auth ? { uid: auth.uid, email: auth.email, username: emailToUsername(auth.email) } : null;
  }

  // ── Firebase Realtime Database ───────────────────────────
  function dbUrl(path) {
    const baseUrl = (typeof FIREBASE_RTDB_URL !== 'undefined' && FIREBASE_RTDB_URL)
      ? FIREBASE_RTDB_URL.replace(/\/$/, '')
      : `https://${FIREBASE_PROJECT_ID}-default-rtdb.firebaseio.com`;
    return `${baseUrl}/${path}`;
  }

  // RTDB has no real arrays: they round-trip as objects with numeric
  // keys when sparse, and empty ones vanish entirely.
  function toArr(v) {
    if (Array.isArray(v)) return v;
    if (v && typeof v === 'object') {
      return Object.keys(v).sort((a, b) => (+a) - (+b)).map(k => v[k]);
    }
    return [];
  }

  // workouts array [{date, dayType, exercises}] ⇄ date-keyed map
  // { "YYYY-MM-DD": { dayType, exercises } } as stored in RTDB.
  function workoutsToMap(list) {
    const map = {};
    (list || []).forEach(w => {
      if (!w || !w.date) return;
      const { date, ...rest } = w;
      map[date] = rest;
    });
    return map;
  }

  function workoutsToArray(map) {
    if (!map || typeof map !== 'object') return null;
    return Object.entries(map)
      .map(([date, w]) => ({
        date,
        ...(w || {}),
        exercises: toArr(w && w.exercises).map(e => ({ ...e, sets: toArr(e && e.sets) }))
      }))
      .sort((a, b) => b.date.localeCompare(a.date));
  }

  // Shape a raw gym/{id} node (from readDoc or an EventSource packet)
  // into { uid, ts, name, avatar, github, following, workouts, blob }.
  // `workouts` is an array (or null for legacy blob-only docs, whose
  // `blob` app.js still knows how to decode).
  function normalizeDocData(data) {
    if (!data) return null;
    return {
      uid: data.uid || '',
      ts: data.ts || 0,
      name: data.name || '',
      avatar: data.avatar || '',
      bio: data.bio || '',
      github: data.github || '',
      bw: data.bw || 0,
      following: toArr(data.following).map(String),
      workouts: workoutsToArray(data.workouts),
      blob: data.blob || ''
    };
  }

  // Read a user's node; returns the normalized doc or null when missing.
  async function readDoc(docId) {
    if (!hasBackend() || !docId) return null;
    const token = await getIdToken();
    const res = await fetch(dbUrl(`gym/${encodeURIComponent(docId)}.json?auth=${token}`));
    if (!res.ok) throw new Error('Database responded ' + res.status);
    return normalizeDocData(await res.json());
  }

  // Create-or-overwrite gym/{userId} with the structured day-wise doc
  // ({ ts, workouts: [...] } in; profile fields come from config) and
  // refresh the directory metadata.
  async function writeDoc(payload) {
    loadConfig();
    if (!isConnected()) throw new Error('Firebase not configured');
    const token = await getIdToken();

    const id = config.userId;
    const data = {
      uid: auth.uid,
      ts: payload.ts || Date.now(),
      name: (config.displayName || config.userId || '').slice(0, 60),
      avatar: config.avatar || '',
      bio: (config.bio || '').slice(0, 120),
      github: config.github || '',
      bw: Math.round((payload.bw || 0) * 10) / 10,
      following: (config.following || []).map(f => f.id),
      workouts: workoutsToMap(payload.workouts)
    };

    // Directory metadata: a lightweight mirror (name/avatar/bio/bw/following)
    // so listings don't have to download workout data. `uid` lets the rules
    // validate the write on its own, which is what makes the atomic write below
    // legal for a brand-new account.
    const meta = {
      uid: auth.uid,
      name: data.name,
      ts: data.ts,
      avatar: data.avatar,
      bio: data.bio,
      bw: data.bw,
      following: data.following
    };

    // One atomic multi-path update: gym/ and directory/ commit together (or
    // not at all), in a single round-trip instead of two.
    const res = await fetch(dbUrl(`.json?auth=${token}`), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [`gym/${id}`]: data, [`directory/${id}`]: meta })
    });
    if (res.ok) return true;
    if (res.status === 403 || res.status === 401) {
      // Either the id is taken, or the older security rules (which gate the
      // directory write on an already-existing gym node) reject the atomic
      // write for a first-time account. Fall back to the sequential path,
      // which succeeds under both rule sets and surfaces the "taken" error.
      return writeDocSequential(id, token, data, meta);
    }
    throw new Error('Database responded ' + res.status);
  }

  // Legacy two-step write: gym/ first (so the node exists), then directory/.
  async function writeDocSequential(id, token, data, meta) {
    const res1 = await fetch(dbUrl(`gym/${encodeURIComponent(id)}.json?auth=${token}`), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res1.status === 403 || res1.status === 401) {
      throw new Error(`Username "${id}" is taken by another account — pick a different one in My Account`);
    }
    if (!res1.ok) throw new Error('Database responded ' + res1.status);

    await fetch(dbUrl(`directory/${encodeURIComponent(id)}.json?auth=${token}`), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(meta)
    });
    return true;
  }

  // Read many gym/{id} docs in parallel (admin dashboard). Returns a map
  // { id: normalizedDoc|null }; failed/missing reads become null rather
  // than rejecting the whole batch.
  async function readAllDocs(ids) {
    const list = Array.isArray(ids) ? ids : [];
    const out = {};
    await Promise.all(list.map(async id => {
      try { out[id] = await readDoc(id); }
      catch (_) { out[id] = null; }
    }));
    return out;
  }

  // Delete an athlete's gym + directory nodes (orphans left behind by a
  // username change, or a duplicate account). The RTDB rules only permit a
  // client to write a node whose `uid` matches the signed-in user, so this
  // succeeds only for accounts the caller owns — e.g. your own leftover
  // nodes from renames, which all carry your uid. Directory is deleted
  // first: its rule falls back to the gym node's uid, which must still
  // exist to authorize the removal.
  async function deleteDoc(id) {
    if (!isConnected()) throw new Error('Not signed in');
    const token = await getIdToken();
    const dir = await fetch(dbUrl(`directory/${encodeURIComponent(id)}.json?auth=${token}`), { method: 'DELETE' });
    if (dir.status === 401 || dir.status === 403) {
      throw new Error(`Not allowed to delete @${id} — that account isn't yours`);
    }
    if (!dir.ok) throw new Error('Database responded ' + dir.status);
    const gym = await fetch(dbUrl(`gym/${encodeURIComponent(id)}.json?auth=${token}`), { method: 'DELETE' });
    if (!gym.ok) throw new Error('Database responded ' + gym.status);
    return true;
  }

  // ── Progress Pics (base64 JPEG stored in RTDB) ──────────
  // Each pic is a record at progress/{userId}/{pushId} =
  // { uid, img, ts, caption, bw } where `img` is a base64 JPEG data-URI
  // (same approach as avatars, just larger). Stored in the Realtime
  // Database — NOT Cloud Storage — so it stays on the free Spark plan.
  // Kept OUT of the gym node so a workout save (which PUT-replaces the
  // whole gym node) can't wipe it. Keep images small: they download with
  // the record, and the RTDB rule caps `img` length.
  async function addProgressPic(dataUri, info) {
    if (!isConnected()) throw new Error('Not signed in');
    const img = String(dataUri || '');
    if (!img.startsWith('data:image/')) throw new Error('Invalid image');
    if (img.length > 900000) throw new Error('Photo too large — try a smaller image');
    const token = await getIdToken();
    const record = {
      uid: auth.uid,
      img,
      ts: Date.now(),
      caption: String((info && info.caption) || '').slice(0, 80),
      bw: Math.round(((info && info.bw) || 0) * 10) / 10
    };
    const res = await fetch(dbUrl(`progress/${encodeURIComponent(config.userId)}.json?auth=${token}`), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(record)
    });
    if (res.status === 401 || res.status === 403) throw new Error('Progress pics need the updated database rules');
    if (!res.ok) throw new Error('Could not save photo (' + res.status + ')');
    const out = await res.json();
    return { pid: (out && out.name) || '', ...record };
  }
  // List an athlete's progress pics, newest first.
  async function listProgressPics(ownerId) {
    if (!hasBackend() || !ownerId) return [];
    try {
      const token = await getIdToken();
      const res = await fetch(dbUrl(`progress/${encodeURIComponent(ownerId)}.json?auth=${token}`));
      if (!res.ok) return [];
      const data = await res.json();
      if (!data || typeof data !== 'object') return [];
      return Object.entries(data)
        .map(([pid, p]) => ({ pid, img: (p && p.img) || '', ts: (p && p.ts) || 0, caption: (p && p.caption) || '', bw: (p && p.bw) || 0 }))
        .sort((a, b) => b.ts - a.ts);
    } catch (_) { return []; }
  }
  // Remove a pic record.
  async function deleteProgressPic(pid) {
    if (!isConnected()) throw new Error('Not signed in');
    const token = await getIdToken();
    const del = await fetch(dbUrl(`progress/${encodeURIComponent(config.userId)}/${encodeURIComponent(pid)}.json?auth=${token}`), { method: 'DELETE' });
    if (!del.ok) throw new Error('Could not delete photo (' + del.status + ')');
    return true;
  }

  // Lists every directory metadata entry
  async function listUsers() {
    if (!hasBackend()) return [];
    const token = await getIdToken();
    const res = await fetch(dbUrl(`directory.json?auth=${token}`));
    if (!res.ok) throw new Error('Database responded ' + res.status);
    const data = await res.json();
    if (!data) return [];
    const users = [];
    Object.entries(data).forEach(([id, u]) => {
      users.push({
        id,
        name: (u && u.name) || id,
        ts: (u && u.ts) || 0,
        avatar: (u && u.avatar) || '',
        bio: (u && u.bio) || '',
        bw: (u && u.bw) || 0,
        following: toArr(u && u.following).map(String)
      });
    });
    return users;
  }

  // ── Social: kudos + comments ─────────────────────────────
  // Workouts are keyed day-wise, so a workout's social id is
  // {ownerId}/{date}. Nodes:
  //   kudos/{ownerId}/{date}/{likerUid}: true
  //   comments/{ownerId}/{date}/{pushId}: {uid, name, text, ts}
  // These require the extended RTDB rules (see the "Copy Database
  // Rules" button in app.js). Until those are published, reads return
  // empty and writes reject — the UI degrades gracefully.

  function kudosPath(ownerId, date, uid) {
    let p = `kudos/${encodeURIComponent(ownerId)}/${encodeURIComponent(date)}`;
    if (uid) p += `/${encodeURIComponent(uid)}`;
    return p + '.json';
  }
  function commentsPath(ownerId, date, pid) {
    let p = `comments/${encodeURIComponent(ownerId)}/${encodeURIComponent(date)}`;
    if (pid) p += `/${encodeURIComponent(pid)}`;
    return p + '.json';
  }

  // Returns { count, mine, uids } — mine = did the signed-in user kudo.
  async function readKudos(ownerId, date) {
    const empty = { count: 0, mine: false, uids: [] };
    if (!hasBackend() || !ownerId || !date) return empty;
    try {
      const token = await getIdToken();
      const res = await fetch(dbUrl(`${kudosPath(ownerId, date)}?auth=${token}`));
      if (!res.ok) return empty;
      const data = await res.json();
      const uids = (data && typeof data === 'object') ? Object.keys(data).filter(k => data[k]) : [];
      const me = getUser();
      return { count: uids.length, mine: !!(me && uids.indexOf(me.uid) !== -1), uids };
    } catch (_) { return empty; }
  }

  // Add or remove the signed-in user's kudos; resolves to the new
  // boolean state (true = now kudoed).
  async function toggleKudos(ownerId, date) {
    if (!isConnected()) throw new Error('Not signed in');
    const me = getUser();
    const token = await getIdToken();
    const url = dbUrl(`${kudosPath(ownerId, date, me.uid)}?auth=${token}`);
    const cur = await fetch(url);
    const val = cur.ok ? await cur.json() : null;
    if (val) {
      await fetch(url, { method: 'DELETE' });
      return false;
    }
    const put = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: 'true' });
    if (!put.ok) throw new Error('Kudos not enabled yet');
    return true;
  }

  // Returns an ascending-by-time array of { pid, uid, name, text, ts }.
  async function readComments(ownerId, date) {
    if (!hasBackend() || !ownerId || !date) return [];
    try {
      const token = await getIdToken();
      const res = await fetch(dbUrl(`${commentsPath(ownerId, date)}?auth=${token}`));
      if (!res.ok) return [];
      const data = await res.json();
      if (!data || typeof data !== 'object') return [];
      return Object.entries(data)
        .map(([pid, c]) => ({ pid, uid: (c && c.uid) || '', name: (c && c.name) || '', text: (c && c.text) || '', ts: (c && c.ts) || 0 }))
        .sort((a, b) => a.ts - b.ts);
    } catch (_) { return []; }
  }

  async function addComment(ownerId, date, text) {
    if (!isConnected()) throw new Error('Not signed in');
    loadConfig();
    const me = getUser();
    const token = await getIdToken();
    const body = {
      uid: me.uid,
      name: (config.displayName || config.userId || (me && me.username) || '').slice(0, 60),
      text: String(text || '').slice(0, 300),
      ts: Date.now()
    };
    const res = await fetch(dbUrl(`${commentsPath(ownerId, date)}?auth=${token}`), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('Comments not enabled yet');
    const out = await res.json();
    return { pid: (out && out.name) || '', ...body };
  }

  // ── Status ───────────────────────────────────────────────
  function isConnected() {
    return hasBackend() && !!getUser() && !!config.userId;
  }

  function getConfig() {
    loadConfig();
    return {
      ...config,
      following: config.following.map(f => ({ ...f })),
      projectId: FIREBASE_PROJECT_ID,
      backendReady: hasBackend(),
      user: getUser(),
      connected: isConnected()
    };
  }

  // Initialize
  loadConfig();
  loadAuth();

  return {
    updateConfig,
    signUp,
    signIn,
    signOut,
    restoreSession,
    getUser,
    getIdToken,
    readDoc,
    readAllDocs,
    writeDoc,
    deleteDoc,
    addProgressPic,
    listProgressPics,
    deleteProgressPic,
    normalizeDocData,
    listUsers,
    readKudos,
    toggleKudos,
    readComments,
    addComment,
    isConnected,
    getConfig
  };
})();

</script>
<script>
/* ═══════════════════════════════════════════════════════════════
   ASCA GYM — Admin Console
   A maintainer-only dashboard to inspect every athlete's profile,
   workouts and activity. Reuses the app's Firebase module
   (firebase-sync.js) for auth + reads. Access is gated to maintainer
   usernames (see ADMIN_PREFIXES) — anyone else who signs in is
   refused. Note: the RTDB rules already let any signed-in account
   read the directory + each gym/{id} node over REST, so this page
   only gates the *console UI*, not the data itself.
   ═══════════════════════════════════════════════════════════════ */
(() => {
  'use strict';

  const ADMIN_PREFIXES = ['anshul'];

  const $ = id => document.getElementById(id);
  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  let USERS = [];      // directory entries [{id,name,ts,avatar,bio,bw,following}]
  let DOCS = {};       // { id: normalizedDoc|null } full workout docs
  let sortKey = 'ts';
  let sortDir = -1;    // -1 desc, 1 asc
  let searchQ = '';

  // ── Metric helpers ───────────────────────────────────────
  function setVol(s) { return (parseFloat(s.weight) || 0) * (parseInt(s.reps, 10) || 0); }
  function woVol(w) { let v = 0; (w.exercises || []).forEach(e => (e.sets || []).forEach(s => { v += setVol(s); })); return v; }
  function totalVol(ws) { let v = 0; (ws || []).forEach(w => { v += woVol(w); }); return v; }
  function daysSince(dateStr) { const d = new Date(dateStr + 'T00:00:00'); return (Date.now() - d.getTime()) / 86400000; }
  function weekVol(ws) { let v = 0; (ws || []).forEach(w => { const dd = daysSince(w.date); if (dd >= 0 && dd < 7) v += woVol(w); }); return v; }
  function sessions(ws) { return (ws || []).filter(w => w && w.dayType !== 'Rest Day' && Array.isArray(w.exercises) && w.exercises.length); }
  function score(ws, bw) { const b = bw > 0 ? bw : 75; return Math.round(weekVol(ws) / b); }
  function setCount(w) { return (w.exercises || []).reduce((s, e) => s + (e.sets ? e.sets.length : 0), 0); }

  function followersOf(id, dir) {
    return dir.filter(u => u.id !== id && Array.isArray(u.following) && u.following.map(String).includes(String(id))).length;
  }

  function fmtNum(n) {
    n = Math.round(n || 0);
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
  }
  function timeAgo(ms) {
    if (!ms) return 'never';
    const s = (Date.now() - ms) / 1000;
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    const d = Math.floor(s / 86400);
    if (d < 30) return d + 'd ago';
    if (d < 365) return Math.floor(d / 30) + 'mo ago';
    return Math.floor(d / 365) + 'y ago';
  }
  function fmtDate(dateStr) {
    try { return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }); }
    catch (_) { return dateStr; }
  }

  function dayTypeColor(t) {
    t = (t || '').toLowerCase();
    if (t.includes('push')) return '#0A84FF';
    if (t.includes('pull')) return '#BF5AF2';
    if (t.includes('leg')) return '#30D158';
    if (t.includes('shoulder')) return '#FF9F0A';
    if (t.includes('rest')) return '#8E8E93';
    return '#FF7600';
  }

  function hashHue(str) { let h = 0; for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) % 360; return h; }
  function avatarBg(id) { const h = hashHue(id || '?'); return `linear-gradient(135deg, hsl(${h} 70% 55%), hsl(${(h + 40) % 360} 70% 45%))`; }
  function avatarHtml(u) {
    const id = u.id || '?';
    const name = u.name || id;
    if (u.avatar) return `<div class="admin-avatar"><img src="${esc(u.avatar)}" alt=""></div>`;
    return `<div class="admin-avatar" style="background:${avatarBg(id)}">${esc((name[0] || '?').toUpperCase())}</div>`;
  }

  // ── Auth gate ────────────────────────────────────────────
  function isMaintainer(username) {
    const u = (username || '').toLowerCase();
    return ADMIN_PREFIXES.some(p => u.startsWith(p));
  }

  function showGate(msg) {
    $('adminGate').style.display = 'flex';
    $('adminShell').style.display = 'none';
    const err = $('adminGateErr');
    if (msg) { err.textContent = msg; err.style.display = 'block'; }
    else err.style.display = 'none';
  }

  async function enterConsole(user) {
    $('adminGate').style.display = 'none';
    $('adminShell').style.display = 'block';
    $('adminWhoami').innerHTML = 'Signed in as <b>@' + esc(user.username) + '</b>';
    await loadData();
  }

  async function attemptSignIn() {
    const err = $('adminGateErr');
    err.style.display = 'none';
    const btn = $('adminSignIn');
    const username = $('adminUser').value.trim();
    const password = $('adminPass').value;
    if (!username || !password) { err.textContent = 'Enter username and password'; err.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      await FirebaseSync.signIn(username, password);
      const user = FirebaseSync.getUser();
      if (!user || !isMaintainer(user.username)) {
        showGate('Not authorized — maintainer accounts only.');
      } else {
        await enterConsole(user);
      }
    } catch (e) {
      err.textContent = (e && e.message) || 'Sign-in failed';
      err.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'Enter Console';
    }
  }

  // ── Data load + render ───────────────────────────────────
  async function loadData() {
    $('adminOverview').innerHTML = '<div class="admin-loading" style="grid-column:1/-1">Loading athletes…</div>';
    $('adminTableBody').innerHTML = '<tr><td colspan="6" class="admin-loading">Loading…</td></tr>';
    $('adminActivity').innerHTML = '<div class="admin-loading">Loading…</div>';
    try {
      USERS = await FirebaseSync.listUsers();
      DOCS = await FirebaseSync.readAllDocs(USERS.map(u => u.id));
    } catch (e) {
      $('adminOverview').innerHTML = '<div class="admin-empty" style="grid-column:1/-1">Failed to load: ' + esc(e && e.message) + '</div>';
      return;
    }
    renderOverview();
    renderTable();
    renderActivity();
  }

  function docWorkouts(id) { const d = DOCS[id]; return (d && d.workouts) ? d.workouts : []; }

  function renderOverview() {
    let totalWorkouts = 0, grandVol = 0, activeWeek = 0;
    USERS.forEach(u => {
      const ws = sessions(docWorkouts(u.id));
      totalWorkouts += ws.length;
      grandVol += totalVol(ws);
      const recent = u.ts && (Date.now() - u.ts) < 7 * 86400000;
      if (recent) activeWeek++;
    });
    const cards = [
      { label: 'Athletes', val: USERS.length, sub: 'registered' },
      { label: 'Active this week', val: activeWeek, sub: 'synced in 7d' },
      { label: 'Total workouts', val: totalWorkouts, sub: 'across all users' },
      { label: 'Total volume', val: fmtNum(grandVol), sub: 'kg lifted' }
    ];
    $('adminOverview').innerHTML = cards.map(c =>
      `<div class="card glass-card admin-stat"><div class="admin-stat-label">${c.label}</div><div class="admin-stat-val">${c.val}</div><div class="admin-stat-sub">${c.sub}</div></div>`
    ).join('');
  }

  function userRows() {
    return USERS.map(u => {
      const ws = docWorkouts(u.id);
      const sess = sessions(ws);
      return {
        id: u.id,
        name: u.name || u.id,
        avatar: u.avatar,
        bio: u.bio,
        bw: u.bw,
        ts: u.ts || 0,
        workouts: sess.length,
        vol: totalVol(sess),
        week: weekVol(ws),
        score: score(ws, u.bw),
        followers: followersOf(u.id, USERS),
        following: Array.isArray(u.following) ? u.following.length : 0
      };
    });
  }

  function renderTable() {
    let rows = userRows();
    if (searchQ) {
      const q = searchQ.toLowerCase();
      rows = rows.filter(r => r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q) || (r.bio || '').toLowerCase().includes(q));
    }
    rows.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (sortKey === 'name') { av = av.toLowerCase(); bv = (bv || '').toLowerCase(); return av < bv ? sortDir : av > bv ? -sortDir : 0; }
      return (av - bv) * sortDir;
    });
    $('adminUserCount').textContent = rows.length + ' athlete' + (rows.length === 1 ? '' : 's');
    const body = $('adminTableBody');
    if (!rows.length) { body.innerHTML = '<tr><td colspan="6" class="admin-empty">No athletes found.</td></tr>'; return; }
    body.innerHTML = rows.map(r => {
      const dd = r.ts ? (Date.now() - r.ts) / 86400000 : 999;
      const cls = dd < 7 ? 'hot' : dd < 30 ? 'warm' : 'cold';
      return `<tr data-id="${esc(r.id)}">
        <td><div class="admin-user-cell">${avatarHtml(r)}<div class="admin-user-meta"><span class="admin-user-name">${esc(r.name)}</span><span class="admin-user-id">@${esc(r.id)}</span></div></div></td>
        <td class="num">${r.workouts}</td>
        <td class="num">${fmtNum(r.vol)}</td>
        <td class="num">${r.score}</td>
        <td class="num">${r.followers}</td>
        <td class="num"><span class="admin-pill ${cls}">${timeAgo(r.ts)}</span></td>
      </tr>`;
    }).join('');
    body.querySelectorAll('tr[data-id]').forEach(tr => tr.addEventListener('click', () => openDrawer(tr.dataset.id)));
  }

  function renderActivity() {
    const feed = [];
    USERS.forEach(u => {
      sessions(docWorkouts(u.id)).forEach(w => feed.push({ id: u.id, name: u.name || u.id, avatar: u.avatar, w }));
    });
    feed.sort((a, b) => (b.w.date || '').localeCompare(a.w.date || ''));
    const el = $('adminActivity');
    if (!feed.length) { el.innerHTML = '<div class="admin-empty">No activity yet.</div>'; return; }
    el.innerHTML = feed.slice(0, 80).map(({ id, name, avatar, w }) => {
      const vol = woVol(w);
      const dtc = dayTypeColor(w.dayType);
      return `<div class="admin-act-item" data-id="${esc(id)}" style="cursor:pointer">
        ${avatarHtml({ id, name, avatar })}
        <div class="admin-act-body">
          <div class="admin-act-line1">${esc(name)} <span>· ${esc(w.dayType || 'Workout')}</span></div>
          <div class="admin-act-line2">${fmtDate(w.date)} · ${w.exercises.length} exercises · ${setCount(w)} sets</div>
        </div>
        <div class="admin-act-vol" style="color:${dtc}">${fmtNum(vol)} kg</div>
      </div>`;
    }).join('');
    el.querySelectorAll('.admin-act-item[data-id]').forEach(it => it.addEventListener('click', () => openDrawer(it.dataset.id)));
  }

  // ── Detail drawer ────────────────────────────────────────
  function openDrawer(id) {
    const u = USERS.find(x => x.id === id) || { id, name: id };
    const ws = docWorkouts(id);
    const sess = sessions(ws);
    const doc = DOCS[id];
    const me = FirebaseSync.getUser();
    // Deletable only if the node's uid matches the signed-in maintainer —
    // the same condition the RTDB write rule enforces.
    const mine = !!(me && doc && doc.uid && doc.uid === me.uid);
    $('adminDrawerHead').innerHTML = `
      ${avatarHtml(u)}
      <div style="min-width:0">
        <div style="font-family:var(--ff-title);font-size:1.15rem;font-weight:800">${esc(u.name || id)}</div>
        <div style="font-size:0.78rem;color:var(--t-3)">@${esc(id)}${u.bio ? ' · ' + esc(u.bio) : ''}</div>
      </div>
      <button class="btn-close admin-drawer-close" id="adminDrawerClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    const mini = [
      { v: sess.length, l: 'Workouts' },
      { v: fmtNum(totalVol(sess)), l: 'Volume kg' },
      { v: score(ws, u.bw), l: 'Score' },
      { v: u.bw ? u.bw + 'kg' : '—', l: 'Body wt' }
    ];
    const legacy = doc && !doc.workouts && doc.blob ? '<div class="admin-wo-meta" style="margin-bottom:12px">⚠︎ Legacy compressed data — workout details not expanded here.</div>' : '';
    const woHtml = sess.length
      ? sess.slice(0, 60).map(w => {
          const dtc = dayTypeColor(w.dayType);
          return `<div class="admin-wo">
            <div class="admin-wo-head">
              <span class="admin-wo-date">${fmtDate(w.date)}</span>
              <span class="admin-wo-type" style="background:${dtc}22;color:${dtc}">${esc(w.dayType || 'Workout')}</span>
            </div>
            <div class="admin-wo-meta">${w.exercises.length} exercises · ${setCount(w)} sets · ${fmtNum(woVol(w))} kg volume</div>
          </div>`;
        }).join('')
      : '<div class="admin-empty">No workouts logged.</div>';
    $('adminDrawerBody').innerHTML = `
      <div class="admin-mini-stats">${mini.map(m => `<div class="admin-mini-stat"><div class="admin-mini-stat-val">${m.v}</div><div class="admin-mini-stat-label">${m.l}</div></div>`).join('')}</div>
      <div style="display:flex;gap:16px;margin-bottom:18px;font-size:0.78rem;color:var(--t-2);font-weight:700">
        <span><b style="color:#fff">${Array.isArray(u.following) ? u.following.length : 0}</b> following</span>
        <span><b style="color:#fff">${followersOf(id, USERS)}</b> followers</span>
        <span>Last active <b style="color:#fff">${timeAgo(u.ts)}</b></span>
      </div>
      ${legacy}
      <div class="admin-section-title" style="margin-top:0;font-size:0.9rem">Workout history</div>
      ${woHtml}
      <div class="admin-section-title" style="font-size:0.9rem;color:#ff5a5a">Danger zone</div>
      <div class="admin-wo-meta" style="margin-bottom:10px">${mine
        ? 'Permanently delete this account’s <b>gym</b> and <b>directory</b> nodes. Use this to clear orphan accounts left behind by username changes.'
        : 'This account isn’t yours — the database rules only let you delete accounts you own (same login). Deleting it here will be rejected.'}</div>
      <button id="adminDeleteBtn" class="admin-danger-btn" data-id="${esc(id)}" style="background:${mine ? 'rgba(255,60,60,0.14)' : 'rgba(120,120,120,0.14)'};color:${mine ? '#ff5a5a' : 'var(--t-3)'};border:1px solid ${mine ? 'rgba(255,60,60,0.4)' : 'rgba(120,120,120,0.3)'};border-radius:10px;padding:10px 16px;font-weight:800;font-size:0.82rem;cursor:pointer;font-family:inherit">Delete @${esc(id)}</button>`;
    $('adminDrawerClose').addEventListener('click', closeDrawer);
    bindDeleteBtn(id);
    $('adminDrawerBg').classList.add('open');
    $('adminDrawer').classList.add('open');
  }

  // Two-step, no blocking dialog: first click arms, second click deletes.
  function bindDeleteBtn(id) {
    const btn = $('adminDeleteBtn');
    if (!btn) return;
    let armed = false, timer = null;
    btn.addEventListener('click', async () => {
      if (!armed) {
        armed = true;
        btn.textContent = 'Click again to confirm delete';
        timer = setTimeout(() => { armed = false; btn.textContent = 'Delete @' + id; }, 4000);
        return;
      }
      clearTimeout(timer);
      btn.disabled = true; btn.textContent = 'Deleting…';
      try {
        await FirebaseSync.deleteDoc(id);
        closeDrawer();
        await loadData();
      } catch (e) {
        btn.disabled = false; armed = false;
        btn.textContent = 'Delete @' + id;
        let msg = document.getElementById('adminDeleteErr');
        if (!msg) {
          msg = document.createElement('div');
          msg.id = 'adminDeleteErr';
          msg.className = 'admin-wo-meta';
          msg.style.cssText = 'color:#ff5a5a;margin-top:10px';
          btn.insertAdjacentElement('afterend', msg);
        }
        msg.textContent = (e && e.message) || 'Delete failed';
      }
    });
  }
  function closeDrawer() {
    $('adminDrawerBg').classList.remove('open');
    $('adminDrawer').classList.remove('open');
  }

  // ── Wire up ──────────────────────────────────────────────
  function bind() {
    $('adminSignIn').addEventListener('click', attemptSignIn);
    $('adminPass').addEventListener('keydown', e => { if (e.key === 'Enter') attemptSignIn(); });
    $('adminUser').addEventListener('keydown', e => { if (e.key === 'Enter') $('adminPass').focus(); });
    $('adminRefresh').addEventListener('click', loadData);
    $('adminSignOut').addEventListener('click', () => { FirebaseSync.signOut(); showGate(); });
    $('adminSearch').addEventListener('input', e => { searchQ = e.target.value; renderTable(); });
    $('adminDrawerBg').addEventListener('click', closeDrawer);
    document.querySelectorAll('#adminTable thead th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (sortKey === key) sortDir = -sortDir;
        else { sortKey = key; sortDir = (key === 'name') ? 1 : -1; }
        document.querySelectorAll('#adminTable thead th .sort-caret').forEach(c => c.remove());
        const caret = document.createElement('span');
        caret.className = 'sort-caret';
        caret.textContent = sortDir === 1 ? '▲' : '▼';
        th.appendChild(caret);
        renderTable();
      });
    });
  }

  async function init() {
    bind();
    if (!FirebaseSync.getConfig().backendReady) {
      showGate('Backend not configured.');
      return;
    }
    // Auto-enter if a maintainer session is already restored (shared origin).
    try {
      const res = await FirebaseSync.restoreSession();
      const user = FirebaseSync.getUser();
      if (res && res !== 'offline' && user && isMaintainer(user.username)) {
        await enterConsole(user);
        return;
      }
    } catch (_) {}
    showGate();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

</script>
</body>
</html>
